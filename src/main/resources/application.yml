server:
  servlet:
    context-path: /todo-list/v1

spring:
  application:
    name: todolist
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/todolist?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:todo}
    password: ${DB_PASSWORD:todo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${GOOGLE_ISSUER_URI:https://accounts.google.com}

app:
  security:
    google:
      audience: ${GOOGLE_AUDIENCE:changeme.apps.googleusercontent.com}
  instance-id: ${INSTANCE_ID:todo-list-local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
